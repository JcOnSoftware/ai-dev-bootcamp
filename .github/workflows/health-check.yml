name: Weekly health check

on:
  schedule:
    # Every Monday at 12:00 UTC
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  health-check:
    name: Full test suite against real APIs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run CLI + runner unit tests
        run: bun test packages/cli packages/runner

      - name: Run Anthropic exercises against real API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          AIDEV_TARGET: solution
          AIDEV_PROVIDER: anthropic
        run: bun test packages/exercises/anthropic

      - name: Run OpenAI exercises against real API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AIDEV_TARGET: solution
          AIDEV_PROVIDER: openai
        run: bun test packages/exercises/openai
